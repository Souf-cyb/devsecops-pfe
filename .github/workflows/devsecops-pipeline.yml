name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          mkdir -p reports
          semgrep --config=p/owasp-top-ten ./app --json > reports/semgrep-report.json || true
          semgrep --config=p/php ./app --json >> reports/semgrep-report.json || true

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep-report.json

  sca-dependency-check:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: |
          cd app
          curl -sS https://getcomposer.org/installer | php
          php composer.phar install --no-interaction --ignore-platform-reqs || true
          ls -la

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecops-pfe'
          path: './app'
          format: 'HTML'
          args: >
            --enableExperimental

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build VulnShop image
        run: |
          docker build -t vulnshop ./app
          echo "✅ VulnShop built successfully"

  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start VulnShop
        run: |
          docker build -t vulnshop ./app
          docker run -d -p 80:80 --name vulnshop vulnshop
          echo "Waiting for VulnShop to start..."
          sleep 30
          curl -s http://localhost:80 || echo "Still starting..."
          sleep 10

      - name: Create ZAP work directory
        run: |
          mkdir -p zap-work
          chmod 777 zap-work
          chmod 777 .

      - name: Run ZAP Full Scan
        run: |
          docker run --network=host \
            -v $(pwd)/zap-work:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:80 \
            -r report_html.html \
            -J report_json.json \
            -I || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: |
            zap-work/report_html.html
            zap-work/report_json.json
