name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Semgrep SAST
        run: |
          mkdir -p reports
          
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/php \
            --json > reports/semgrep-report.json

      - name: Generate Semgrep HTML Report
        run: |
          python3 << 'EOF'
          import json

          with open("reports/semgrep-report.json") as f:
              data = json.load(f)

          results = data.get("results", [])

          html = """
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>Semgrep SAST Report - VulnShop</title>
              <style>
                  body { font-family: Segoe UI, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
                  .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; }
                  .header h1 { margin: 0; font-size: 28px; }
                  .header p { margin: 5px 0 0; opacity: 0.7; }
                  .stats { display: flex; gap: 20px; margin-bottom: 30px; }
                  .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
                  .stat-card h2 { font-size: 40px; margin: 0; }
                  .stat-card p { color: #666; margin: 5px 0 0; }
                  .error { color: #e94560; }
                  .warning { color: #f39c12; }
                  .info { color: #3498db; }
                  .finding { background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border-left: 5px solid #e94560; }
                  .finding.WARNING { border-left-color: #f39c12; }
                  .finding h3 { margin: 0 0 10px; color: #1a1a2e; font-size: 16px; }
                  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-right: 8px; }
                  .badge.ERROR { background: #ffe0e0; color: #e94560; }
                  .badge.WARNING { background: #fff3cd; color: #856404; }
                  .meta { color: #666; font-size: 13px; margin: 8px 0; }
                  .code { background: #1a1a2e; color: #00ff00; padding: 10px 15px; border-radius: 5px; font-family: monospace; font-size: 13px; margin-top: 10px; }
                  .cwe { background: #e8f4fd; color: #2980b9; padding: 3px 8px; border-radius: 5px; font-size: 12px; }
                  .owasp { background: #eafaf1; color: #27ae60; padding: 3px 8px; border-radius: 5px; font-size: 12px; }
                  footer { text-align: center; color: #999; margin-top: 40px; font-size: 13px; }
              </style>
          </head>
          <body>
          <div class="header">
              <h1>🔍 Semgrep SAST Security Report</h1>
              <p>VulnShop — DevSecOps PFE Analysis</p>
          </div>
          """

          errors = [r for r in results if r["extra"]["severity"] == "ERROR"]
          warnings = [r for r in results if r["extra"]["severity"] == "WARNING"]

          html += f"""
          <div class="stats">
              <div class="stat-card"><h2 class="error">{len(results)}</h2><p>Total Findings</p></div>
              <div class="stat-card"><h2 class="error">{len(errors)}</h2><p>🔴 Errors (High)</p></div>
              <div class="stat-card"><h2 class="warning">{len(warnings)}</h2><p>🟠 Warnings (Medium)</p></div>
              <div class="stat-card"><h2 class="info">{len(set(r['path'] for r in results))}</h2><p>📄 Files Affected</p></div>
          </div>
          <h2 style="color:#1a1a2e; margin-bottom:20px;">📋 Findings Details</h2>
          """

          for r in results:
              severity = r["extra"]["severity"]
              check_id = r["check_id"].split(".")[-1]
              path = r["path"]
              line = r["start"]["line"]
              message = r["extra"]["message"]
              metadata = r["extra"].get("metadata", {})
              cwes = metadata.get("cwe", [])
              owasps = metadata.get("owasp", [])

              cwe_badges = " ".join([f'<span class="cwe">{c.split(":")[0]}</span>' for c in cwes])
              owasp_badges = " ".join([f'<span class="owasp">{o.split(" - ")[0]}</span>' for o in owasps])

              html += f"""
              <div class="finding {severity}">
                  <h3>⚠️ {check_id.replace("-", " ").title()}</h3>
                  <span class="badge {severity}">{severity}</span>
                  {cwe_badges} {owasp_badges}
                  <div class="meta">📄 <b>{path}</b> — Line {line}</div>
                  <div class="meta">{message[:200]}...</div>
                  <div class="code">📍 {path}:{line}</div>
              </div>
              """

          html += """
          <footer>
              <p>Generated by Semgrep OSS — VulnShop DevSecOps PFE</p>
          </footer>
          </body></html>
          """

          with open("reports/semgrep-report.html", "w") as f:
              f.write(html)

          print(f"✅ HTML report generated with {len(results)} findings")
          EOF

      - name: Upload Semgrep Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-security-report
          path: |
            reports/semgrep-report.json
            reports/semgrep-report.html

  sca-dependency-check:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: |
          cd app
          curl -sS https://getcomposer.org/installer | php
          php composer.phar install --no-interaction --ignore-platform-reqs || true
          ls -la

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecops-pfe'
          path: './app'
          format: 'HTML'
          args: >
            --enableExperimental

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application with Docker Compose
        run: |
          docker compose up -d --build
          echo "Waiting for services..."
          sleep 40
          docker compose ps
          curl -s http://localhost:80 || echo "App starting..."

  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start VulnShop
        run: |
          docker build -t vulnshop ./app
          docker run -d -p 80:80 --name vulnshop vulnshop
          echo "Waiting for VulnShop to start..."
          sleep 30
          curl -s http://localhost:80 || echo "Still starting..."
          sleep 10

      - name: Create ZAP work directory
        run: |
          mkdir -p zap-work
          chmod 777 zap-work
          chmod 777 .

      - name: Run ZAP Full Scan
        run: |
          docker run --network=host \
            -v $(pwd)/zap-work:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:80 \
            -r report_html.html \
            -J report_json.json \
            -I || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: |
            zap-work/report_html.html
            zap-work/report_json.json
