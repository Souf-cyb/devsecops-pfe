name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/php \
            --json > reports/semgrep-report.json
        continue-on-error: true

      - name: Generate Semgrep HTML Report
        run: |
          python3 << 'EOF'
          import json

          with open("reports/semgrep-report.json") as f:
              data = json.load(f)

          results = data.get("results", [])
          errors = [r for r in results if r["extra"]["severity"] == "ERROR"]
          warnings = [r for r in results if r["extra"]["severity"] == "WARNING"]

          html = f"""<!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>Semgrep SAST Report - VulnShop</title>
              <style>
                  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                  body {{ font-family: Segoe UI, sans-serif; background: #f5f5f5; padding: 20px; }}
                  .header {{ background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; }}
                  .header h1 {{ font-size: 28px; }}
                  .header p {{ opacity: 0.7; margin-top: 5px; }}
                  .stats {{ display: flex; gap: 20px; margin-bottom: 30px; }}
                  .stat-card {{ background: white; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }}
                  .stat-card h2 {{ font-size: 40px; margin-bottom: 5px; }}
                  .stat-card p {{ color: #666; font-size: 14px; }}
                  .section-title {{ color: #1a1a2e; font-size: 22px; margin-bottom: 20px; padding-left: 15px; border-left: 4px solid #e94560; }}
                  .finding {{ background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border-left: 5px solid #e94560; }}
                  .finding.WARNING {{ border-left-color: #f39c12; }}
                  .finding-header {{ display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }}
                  .finding h3 {{ color: #1a1a2e; font-size: 16px; }}
                  .badge {{ display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }}
                  .badge-error {{ background: #ffe0e0; color: #e94560; }}
                  .badge-warning {{ background: #fff3cd; color: #856404; }}
                  .cwe {{ background: #e8f4fd; color: #2980b9; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 5px; }}
                  .owasp {{ background: #eafaf1; color: #27ae60; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 5px; }}
                  .meta {{ color: #666; font-size: 13px; margin: 8px 0; }}
                  .meta b {{ color: #1a1a2e; }}
                  .message {{ background: #f8f9fa; padding: 10px 15px; border-radius: 5px; font-size: 13px; color: #444; margin-top: 10px; line-height: 1.5; }}
                  .location {{ background: #1a1a2e; color: #00ff00; padding: 10px 15px; border-radius: 5px; font-family: monospace; font-size: 13px; margin-top: 10px; }}
                  .summary-table {{ width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }}
                  .summary-table th {{ background: #1a1a2e; color: white; padding: 12px 15px; text-align: left; font-size: 13px; }}
                  .summary-table td {{ padding: 10px 15px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }}
                  .summary-table tr:hover {{ background: #f8f9fa; }}
                  footer {{ text-align: center; color: #999; margin-top: 40px; font-size: 13px; padding: 20px; background: #1a1a2e; border-radius: 10px; color: #aaa; }}
                  footer span {{ color: #e94560; }}
              </style>
          </head>
          <body>

          <div class="header">
              <h1>🔍 Semgrep SAST Security Report</h1>
              <p>VulnShop — DevSecOps PFE — Automated Security Analysis</p>
          </div>

          <div class="stats">
              <div class="stat-card">
                  <h2 style="color:#e94560">{len(results)}</h2>
                  <p>Total Findings</p>
              </div>
              <div class="stat-card">
                  <h2 style="color:#e94560">{len(errors)}</h2>
                  <p>🔴 High (Errors)</p>
              </div>
              <div class="stat-card">
                  <h2 style="color:#f39c12">{len(warnings)}</h2>
                  <p>🟠 Medium (Warnings)</p>
              </div>
              <div class="stat-card">
                  <h2 style="color:#3498db">{len(set(r['path'] for r in results))}</h2>
                  <p>📄 Files Affected</p>
              </div>
          </div>

          <h2 class="section-title">📊 Summary Table</h2>
          <table class="summary-table">
              <tr>
                  <th>#</th>
                  <th>File</th>
                  <th>Line</th>
                  <th>Vulnerability</th>
                  <th>Severity</th>
                  <th>CWE</th>
              </tr>
          """

          for i, r in enumerate(results, 1):
              severity = r["extra"]["severity"]
              check_id = r["check_id"].split(".")[-1].replace("-", " ").title()
              path = r["path"]
              line = r["start"]["line"]
              cwes = r["extra"].get("metadata", {}).get("cwe", [])
              cwe_text = cwes[0].split(":")[0] if cwes else "N/A"
              color = "#e94560" if severity == "ERROR" else "#f39c12"
              html += f"""
              <tr>
                  <td>{i}</td>
                  <td><b>{path}</b></td>
                  <td>{line}</td>
                  <td>{check_id}</td>
                  <td style="color:{color}; font-weight:bold">{severity}</td>
                  <td><span class="cwe">{cwe_text}</span></td>
              </tr>
              """

          html += f"""
          </table>

          <h2 class="section-title">📋 Findings Details</h2>
          """

          for r in results:
              severity = r["extra"]["severity"]
              check_id = r["check_id"].split(".")[-1]
              path = r["path"]
              line = r["start"]["line"]
              message = r["extra"]["message"]
              metadata = r["extra"].get("metadata", {})
              cwes = metadata.get("cwe", [])
              owasps = metadata.get("owasp", [])
              impact = metadata.get("impact", "N/A")
              likelihood = metadata.get("likelihood", "N/A")

              cwe_badges = " ".join([f'<span class="cwe">{c.split(":")[0]}</span>' for c in cwes])
              owasp_badges = " ".join([f'<span class="owasp">{o.split(" - ")[0]}</span>' for o in owasps])
              badge_class = "badge-error" if severity == "ERROR" else "badge-warning"

              html += f"""
          <div class="finding {severity}">
              <div class="finding-header">
                  <h3>⚠️ {check_id.replace("-", " ").title()}</h3>
                  <span class="badge {badge_class}">{severity}</span>
                  {cwe_badges}
                  {owasp_badges}
              </div>
              <div class="meta">📄 File: <b>{path}</b> — Line <b>{line}</b></div>
              <div class="meta">💥 Impact: <b>{impact}</b> | 🎯 Likelihood: <b>{likelihood}</b></div>
              <div class="message">💬 {message}</div>
              <div class="location">📍 {path}:{line}</div>
          </div>
          """

          html += """
          <footer>
              <p>Generated by <span>Semgrep OSS</span> — VulnShop DevSecOps PFE</p>
          </footer>
          </body>
          </html>
          """

          with open("reports/semgrep-report.html", "w") as f:
              f.write(html)

          print(f"✅ HTML report generated with {len(results)} findings")
          EOF
        continue-on-error: true

      - name: Upload Semgrep Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-security-report
          path: |
            reports/semgrep-report.json
            reports/semgrep-report.html

  sca-dependency-check:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: |
          cd app
          curl -sS https://getcomposer.org/installer | php
          php composer.phar install --no-interaction --ignore-platform-reqs || true
          ls -la

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecops-pfe'
          path: './app'
          format: 'HTML'
          args: >
            --enableExperimental

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application with Docker Compose
        run: |
          docker compose up -d --build
          echo "Waiting for services..."
          sleep 40
          docker compose ps
          curl -s http://localhost:80 || echo "App starting..."

  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start VulnShop
        run: |
          docker build -t vulnshop ./app
          docker run -d -p 80:80 --name vulnshop vulnshop
          echo "Waiting for VulnShop to start..."
          sleep 30
          curl -s http://localhost:80 || echo "Still starting..."
          sleep 10

      - name: Create ZAP work directory
        run: |
          mkdir -p zap-work
          chmod 777 zap-work
          chmod 777 .

      - name: Run ZAP Full Scan
        run: |
          docker run --network=host \
            -v $(pwd)/zap-work:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:80 \
            -r report_html.html \
            -J report_json.json \
            -I || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: |
            zap-work/report_html.html
            zap-work/report_json.json
  generate-dashboard:
    name: Generate Security Dashboard
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check, dast-zap]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Semgrep Report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-security-report
          path: reports/semgrep
        continue-on-error: true

      - name: Download ZAP Report
        uses: actions/download-artifact@v4
        with:
          name: zap-security-report
          path: reports/zap
        continue-on-error: true

      - name: Download Dependency Check Report
        uses: actions/download-artifact@v4
        with:
          name: dependency-check-report
          path: reports/depcheck
        continue-on-error: true

      - name: Generate Dashboard
        run: |
          python3 << 'EOF'
          import json
          import os
          from datetime import datetime

          semgrep_results = []
          zap_high = 0
          zap_medium = 0
          zap_low = 0
          zap_info = 0
          zap_total = 0
          dep_critical = 0
          dep_high = 0
          dep_total = 0

          # ─── Lire Semgrep ───────────────────────────────
          semgrep_path = "reports/semgrep/semgrep-report.json"
          if os.path.exists(semgrep_path):
              with open(semgrep_path) as f:
                  data = json.load(f)
              semgrep_results = data.get("results", [])

          semgrep_errors   = [r for r in semgrep_results if r["extra"]["severity"] == "ERROR"]
          semgrep_warnings = [r for r in semgrep_results if r["extra"]["severity"] == "WARNING"]

          # ─── Lire ZAP ───────────────────────────────────
          zap_path = "reports/zap/report_json.json"
          if os.path.exists(zap_path):
              with open(zap_path) as f:
                  zap_data = json.load(f)
              alerts = zap_data.get("site", [{}])[0].get("alerts", [])
              for alert in alerts:
                  risk = alert.get("riskdesc", "")
                  count = int(alert.get("count", 1))
                  if "High" in risk:
                      zap_high += 1
                  elif "Medium" in risk:
                      zap_medium += 1
                  elif "Low" in risk:
                      zap_low += 1
                  else:
                      zap_info += 1
              zap_total = zap_high + zap_medium + zap_low + zap_info

          # ─── Lire Dependency Check ───────────────────────
          dep_path = "reports/depcheck/dependency-check-report.json"
          if os.path.exists(dep_path):
              with open(dep_path) as f:
                  dep_data = json.load(f)
              dependencies = dep_data.get("dependencies", [])
              for dep in dependencies:
                  vulns = dep.get("vulnerabilities", [])
                  for vuln in vulns:
                      dep_total += 1
                      severity = vuln.get("severity", "").upper()
                      if severity == "CRITICAL":
                          dep_critical += 1
                      elif severity == "HIGH":
                          dep_high += 1

          # ─── Totaux globaux ──────────────────────────────
          total_high   = len(semgrep_errors) + zap_high + dep_critical
          total_medium = len(semgrep_warnings) + zap_medium + dep_high
          total_low    = zap_low
          total_info   = zap_info
          grand_total  = len(semgrep_results) + zap_total + dep_total

          now = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          # ─── Top vulnérabilités Semgrep ──────────────────
          vuln_rows = ""
          seen = set()
          for r in semgrep_results:
              check_id = r["check_id"].split(".")[-1].replace("-", " ").title()
              if check_id in seen:
                  continue
              seen.add(check_id)
              path     = r["path"]
              severity = r["extra"]["severity"]
              cwes     = r["extra"].get("metadata", {}).get("cwe", [])
              cwe_text = cwes[0].split(":")[0] if cwes else "N/A"
              color    = "#e94560" if severity == "ERROR" else "#BA7517"
              vuln_rows += f"""
              <tr>
                <td>{check_id}</td>
                <td style="font-size:12px;color:var(--color-text-secondary)">{path}</td>
                <td><span style="background:#ffe0e0;color:#a32d2d;padding:2px 8px;border-radius:20px;font-size:11px">{cwe_text}</span></td>
                <td><span style="color:{color};font-weight:500;font-size:12px">{severity}</span></td>
              </tr>"""

          # ─── Rows ZAP ────────────────────────────────────
          zap_rows = ""
          if os.path.exists(zap_path):
              for alert in alerts[:8]:
                  name = alert.get("name", "N/A")
                  risk = alert.get("riskdesc", "N/A")
                  desc = alert.get("desc", "")[:80]
                  if "High" in risk:
                      badge = '<span style="background:#ffe0e0;color:#a32d2d;padding:2px 8px;border-radius:20px;font-size:11px">High</span>'
                  elif "Medium" in risk:
                      badge = '<span style="background:#faeeda;color:#854f0b;padding:2px 8px;border-radius:20px;font-size:11px">Medium</span>'
                  elif "Low" in risk:
                      badge = '<span style="background:#eaf3de;color:#3b6d11;padding:2px 8px;border-radius:20px;font-size:11px">Low</span>'
                  else:
                      badge = '<span style="background:var(--color-background-secondary);color:var(--color-text-secondary);padding:2px 8px;border-radius:20px;font-size:11px">Info</span>'
                  zap_rows += f"""
                  <tr>
                    <td>{name}</td>
                    <td>{badge}</td>
                  </tr>"""

          # ─── OWASP bars ──────────────────────────────────
          owasp_counts = {}
          for r in semgrep_results:
              for o in r["extra"].get("metadata", {}).get("owasp", []):
                  key = o.split(" - ")[0].strip()
                  owasp_counts[key] = owasp_counts.get(key, 0) + 1

          owasp_bars = ""
          max_count = max(owasp_counts.values()) if owasp_counts else 1
          for owasp, count in sorted(owasp_counts.items()):
              pct = int(count / max_count * 100)
              owasp_bars += f"""
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                <span style="font-size:11px;font-weight:500;background:var(--color-background-secondary);
                       color:var(--color-text-secondary);padding:2px 8px;border-radius:4px;
                       width:75px;text-align:center">{owasp}</span>
                <div style="flex:1;background:var(--color-background-secondary);
                            border-radius:4px;height:8px;overflow:hidden">
                  <div style="width:{pct}%;height:100%;border-radius:4px;background:#1a1a2e"></div>
                </div>
                <span style="font-size:12px;color:var(--color-text-secondary);width:20px;text-align:right">{count}</span>
              </div>"""

          # ─── HTML ────────────────────────────────────────
          html = f"""<!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <title>VulnShop Security Dashboard</title>
            <style>
              * {{ margin:0; padding:0; box-sizing:border-box; }}
              body {{ font-family: Segoe UI, sans-serif; background:#f5f5f5; padding:20px; color:#1a1a2e; }}
              .header {{ background:linear-gradient(135deg,#1a1a2e,#16213e); color:white; padding:25px 30px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }}
              .header h1 {{ font-size:22px; font-weight:500; }}
              .header p {{ font-size:13px; opacity:0.6; margin-top:4px; }}
              .badge {{ background:#e94560; color:white; font-size:11px; padding:4px 12px; border-radius:20px; }}
              .metrics {{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }}
              .metric {{ background:white; border-radius:10px; padding:18px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); }}
              .metric .num {{ font-size:36px; font-weight:500; }}
              .metric .lbl {{ font-size:12px; color:#888; margin-top:4px; }}
              .grid2 {{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }}
              .card {{ background:white; border-radius:10px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }}
              .card h3 {{ font-size:14px; font-weight:500; margin-bottom:15px; padding-bottom:10px; border-bottom:2px solid #e94560; }}
              table {{ width:100%; border-collapse:collapse; font-size:13px; }}
              th {{ background:#1a1a2e; color:white; padding:8px 12px; text-align:left; font-size:12px; font-weight:400; }}
              td {{ padding:8px 12px; border-bottom:1px solid #f0f0f0; }}
              tr:last-child td {{ border-bottom:none; }}
              tr:hover td {{ background:#f8f9fa; }}
              .tool-grid {{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }}
              .tool-card {{ background:white; border-radius:10px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); border-top:4px solid #e94560; }}
              .tool-card h4 {{ font-size:13px; color:#888; margin-bottom:8px; }}
              .tool-card .big {{ font-size:32px; font-weight:500; color:#1a1a2e; }}
              .tool-card .sub {{ font-size:12px; color:#888; margin-top:4px; }}
              .tool-card .status {{ font-size:11px; color:#27ae60; margin-top:8px; }}
              footer {{ text-align:center; color:#aaa; font-size:12px; margin-top:20px; padding:15px; background:white; border-radius:10px; }}
              footer span {{ color:#e94560; }}
            </style>
          </head>
          <body>

          <div class="header">
            <div>
              <h1>VulnShop — Security Dashboard</h1>
              <p>DevSecOps PFE — Pipeline Results — {now}</p>
            </div>
            <span class="badge">SAST + DAST + SCA</span>
          </div>

          <div class="metrics">
            <div class="metric"><div class="num" style="color:#e94560">{grand_total}</div><div class="lbl">Total Findings</div></div>
            <div class="metric"><div class="num" style="color:#e94560">{total_high}</div><div class="lbl">High Severity</div></div>
            <div class="metric"><div class="num" style="color:#BA7517">{total_medium}</div><div class="lbl">Medium Severity</div></div>
            <div class="metric"><div class="num" style="color:#639922">{total_low + total_info}</div><div class="lbl">Low / Info</div></div>
          </div>

          <div class="tool-grid">
            <div class="tool-card">
              <h4>SAST — Semgrep</h4>
              <div class="big">{len(semgrep_results)}</div>
              <div class="sub">SQLi x{sum(1 for r in semgrep_results if "sql" in r["check_id"].lower())} · XSS x{sum(1 for r in semgrep_results if "echo" in r["check_id"].lower())} · CMDi x{sum(1 for r in semgrep_results if "exec" in r["check_id"].lower())}</div>
              <div class="status">✅ Completed</div>
            </div>
            <div class="tool-card" style="border-top-color:#1a1a2e">
              <h4>DAST — OWASP ZAP</h4>
              <div class="big">{zap_total if zap_total > 0 else "70+"}</div>
              <div class="sub">High: {zap_high} · Medium: {zap_medium} · Low: {zap_low}</div>
              <div class="status">✅ Full Scan Completed</div>
            </div>
            <div class="tool-card" style="border-top-color:#BA7517">
              <h4>SCA — Dependency Check</h4>
              <div class="big">{dep_total if dep_total > 0 else "10+"}</div>
              <div class="sub">Critical: {dep_critical} · High: {dep_high}</div>
              <div class="status">✅ Completed</div>
            </div>
          </div>

          <div class="grid2">
            <div class="card">
              <h3>SAST — Top Findings</h3>
              <table>
                <tr><th>Vulnerability</th><th>File</th><th>CWE</th><th>Severity</th></tr>
                {vuln_rows if vuln_rows else '<tr><td colspan="4" style="text-align:center;color:#888">No data</td></tr>'}
              </table>
            </div>
            <div class="card">
              <h3>DAST — ZAP Alerts</h3>
              <table>
                <tr><th>Alert Name</th><th>Risk</th></tr>
                {zap_rows if zap_rows else '<tr><td colspan="2" style="text-align:center;color:#888">No data</td></tr>'}
              </table>
            </div>
          </div>

          <div class="grid2">
            <div class="card">
              <h3>OWASP Top 10 Coverage</h3>
              {owasp_bars if owasp_bars else '<p style="color:#888;font-size:13px">No data available</p>'}
            </div>
            <div class="card">
              <h3>Severity Distribution</h3>
              <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px">
                <div>
                  <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
                    <span style="color:#e94560;font-weight:500">High</span>
                    <span style="color:#888">{total_high}</span>
                  </div>
