name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          mkdir -p reports
          semgrep --config=p/owasp-top-ten ./app --json > reports/semgrep-report.json || true
          cat reports/semgrep-report.json

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep-report.json

  sca-dependency-check:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecops-pfe'
          path: '.'
          format: 'HTML'

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t devsecops-app ./app
          echo "Build successful"

dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker build -t devsecops-app ./app
          docker run -d -p 80:80 --name webapp devsecops-app
          sleep 30
          curl -s http://localhost:80 || echo "App starting..."

      - name: Create ZAP work directory
        run: |
          mkdir -p zap-work
          chmod 777 zap-work

      - name: Run ZAP Scan
        run: |
          chmod 777 .
          docker run --network=host \
            -v $(pwd)/zap-work:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:80 \
            -r report_html.html \
            -J report_json.json \
            -I || true
          
          # Copier les rapports
          cp zap-work/report_html.html . || true
          cp zap-work/report_json.json . || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: |
            zap-work/report_html.html
            zap-work/report_json.json
