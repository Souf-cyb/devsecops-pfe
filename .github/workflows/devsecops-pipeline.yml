name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          mkdir -p reports
          semgrep --config=p/owasp-top-ten ./app --json > reports/semgrep-report.json || true

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep-report.json

  sca-dependency-check:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: |
          cd app
          curl -sS https://getcomposer.org/installer | php
          php composer.phar install --no-interaction || true

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecops-pfe'
          path: './app'
          format: 'HTML'
          args: >
            --enableExperimental
            --scan ./app/vendor
            --scan ./app/composer.json

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull Juice Shop image
        run: |
          docker pull bkimminich/juice-shop
          echo "✅ Juice Shop pulled successfully"

  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: |
          docker run -d -p 3000:3000 --name juiceshop bkimminich/juice-shop
          echo "Waiting for Juice Shop to start..."
          sleep 40
          curl -s http://localhost:3000 || echo "Still starting..."
          sleep 20

      - name: Create ZAP work directory
        run: |
          mkdir -p zap-work
          chmod 777 zap-work
          chmod 777 .

      - name: Run ZAP Scan on Juice Shop
        run: |
          docker run --network=host \
            -v $(pwd)/zap-work:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r report_html.html \
            -J report_json.json \
            -I || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: |
            zap-work/report_html.html
            zap-work/report_json.json
