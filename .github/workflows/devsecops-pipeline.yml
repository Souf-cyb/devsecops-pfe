name: DevSecOps Pipeline - VulnShop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

# ═══════════════════════════════════════════════
#  JOB 1 — SAST SEMGREP
# ═══════════════════════════════════════════════
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/php \
            --exclude app/secure \
            --json > reports/semgrep-report.json
        continue-on-error: true

      - name: Security Gate
        run: |
          python3 << 'EOF'
          import json, sys

          with open("reports/semgrep-report.json") as f:
              data = json.load(f)

          results = data.get("results", [])
          critical = [r for r in results if r["extra"]["severity"] == "ERROR"]

          print(f"Total findings  : {len(results)}")
          print(f"Critical (ERROR): {len(critical)}")

          if len(critical) > 30:
              print("❌ SECURITY GATE FAILED — Too many critical vulnerabilities!")
              sys.exit(1)
          else:
              print("✅ SECURITY GATE PASSED!")
          EOF
        continue-on-error: true

      - name: Generate Semgrep HTML Report
        run: |
          python3 << 'EOF'
          import json

          with open("reports/semgrep-report.json") as f:
              data = json.load(f)

          results = data.get("results", [])
          errors = [r for r in results if r["extra"]["severity"] == "ERROR"]
          warnings = [r for r in results if r["extra"]["severity"] == "WARNING"]

          html = f"""<!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>Semgrep SAST Report - VulnShop</title>
              <style>
                  * {{ margin:0; padding:0; box-sizing:border-box; }}
                  body {{ font-family: Segoe UI, sans-serif; background:#f5f5f5; padding:20px; }}
                  .header {{ background:linear-gradient(135deg,#1a1a2e,#16213e); color:white; padding:30px; border-radius:12px; margin-bottom:20px; }}
                  .header h1 {{ font-size:24px; font-weight:500; }}
                  .header p {{ opacity:0.7; margin-top:5px; }}
                  .stats {{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }}
                  .stat {{ background:white; padding:20px; border-radius:10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); }}
                  .stat h2 {{ font-size:36px; font-weight:500; margin-bottom:5px; }}
                  .stat p {{ color:#888; font-size:13px; }}
                  .section-title {{ font-size:18px; font-weight:500; color:#1a1a2e; margin-bottom:15px; padding-left:12px; border-left:4px solid #e94560; }}
                  .table-wrap {{ background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-bottom:20px; }}
                  table {{ width:100%; border-collapse:collapse; font-size:13px; }}
                  th {{ background:#1a1a2e; color:white; padding:10px 15px; text-align:left; font-weight:400; }}
                  td {{ padding:10px 15px; border-bottom:1px solid #f0f0f0; }}
                  tr:last-child td {{ border-bottom:none; }}
                  tr:hover td {{ background:#f8f9fa; }}
                  .finding {{ background:white; border-radius:10px; padding:20px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.06); border-left:5px solid #e94560; }}
                  .finding.WARNING {{ border-left-color:#f39c12; }}
                  .badge {{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; margin-right:6px; }}
                  .badge-error {{ background:#ffe0e0; color:#a32d2d; }}
                  .badge-warning {{ background:#faeeda; color:#854f0b; }}
                  .cwe {{ background:#e8f4fd; color:#2980b9; padding:3px 8px; border-radius:5px; font-size:11px; margin-right:5px; }}
                  .owasp {{ background:#eafaf1; color:#27ae60; padding:3px 8px; border-radius:5px; font-size:11px; margin-right:5px; }}
                  .meta {{ color:#666; font-size:13px; margin:8px 0; }}
                  .message {{ background:#f8f9fa; padding:10px 15px; border-radius:5px; font-size:13px; color:#444; margin-top:10px; line-height:1.5; }}
                  .location {{ background:#1a1a2e; color:#00ff00; padding:10px 15px; border-radius:5px; font-family:monospace; font-size:13px; margin-top:10px; }}
                  footer {{ text-align:center; color:#aaa; font-size:12px; margin-top:30px; padding:20px; background:#1a1a2e; border-radius:10px; }}
                  footer span {{ color:#e94560; }}
              </style>
          </head>
          <body>
          <div class="header">
              <h1>Semgrep SAST Security Report</h1>
              <p>VulnShop — DevSecOps PFE — Automated Security Analysis</p>
          </div>
          <div class="stats">
              <div class="stat"><h2 style="color:#e94560">{len(results)}</h2><p>Total Findings</p></div>
              <div class="stat"><h2 style="color:#e94560">{len(errors)}</h2><p>High (Errors)</p></div>
              <div class="stat"><h2 style="color:#f39c12">{len(warnings)}</h2><p>Medium (Warnings)</p></div>
              <div class="stat"><h2 style="color:#3498db">{len(set(r['path'] for r in results))}</h2><p>Files Affected</p></div>
          </div>
          <p class="section-title">Summary Table</p>
          <div class="table-wrap">
          <table>
              <tr><th>#</th><th>File</th><th>Line</th><th>Vulnerability</th><th>Severity</th><th>CWE</th></tr>
          """

          for i, r in enumerate(results, 1):
              severity = r["extra"]["severity"]
              check_id = r["check_id"].split(".")[-1].replace("-", " ").title()
              path = r["path"]
              line = r["start"]["line"]
              cwes = r["extra"].get("metadata", {}).get("cwe", [])
              cwe_text = cwes[0].split(":")[0] if cwes else "N/A"
              color = "#e94560" if severity == "ERROR" else "#f39c12"
              html += f"""
              <tr>
                  <td>{i}</td>
                  <td><b>{path}</b></td>
                  <td>{line}</td>
                  <td>{check_id}</td>
                  <td style="color:{color};font-weight:500">{severity}</td>
                  <td><span class="cwe">{cwe_text}</span></td>
              </tr>"""

          html += """</table></div>
          <p class="section-title">Findings Details</p>
          """

          for r in results:
              severity = r["extra"]["severity"]
              check_id = r["check_id"].split(".")[-1]
              path = r["path"]
              line = r["start"]["line"]
              message = r["extra"]["message"]
              metadata = r["extra"].get("metadata", {})
              cwes = metadata.get("cwe", [])
              owasps = metadata.get("owasp", [])
              impact = metadata.get("impact", "N/A")
              likelihood = metadata.get("likelihood", "N/A")
              cwe_badges = " ".join([f'<span class="cwe">{c.split(":")[0]}</span>' for c in cwes])
              owasp_badges = " ".join([f'<span class="owasp">{o.split(" - ")[0]}</span>' for o in owasps])
              badge_class = "badge-error" if severity == "ERROR" else "badge-warning"
              html += f"""
          <div class="finding {severity}">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
                  <b style="color:#1a1a2e">{check_id.replace("-"," ").title()}</b>
                  <span class="badge {badge_class}">{severity}</span>
                  {cwe_badges} {owasp_badges}
              </div>
              <div class="meta">File: <b>{path}</b> — Line <b>{line}</b></div>
              <div class="meta">Impact: <b>{impact}</b> | Likelihood: <b>{likelihood}</b></div>
              <div class="message">{message}</div>
              <div class="location">>>> {path}:{line}</div>
          </div>"""

          html += """
          <footer><p>Generated by <span>Semgrep OSS</span> — VulnShop DevSecOps PFE</p></footer>
          </body></html>"""

          with open("reports/semgrep-report.html", "w") as f:
              f.write(html)
          print(f"✅ HTML report generated with {len(results)} findings")
          EOF
        continue-on-error: true

      - name: Upload Semgrep Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-security-report
          path: |
            reports/semgrep-report.json
            reports/semgrep-report.html

# ═══════════════════════════════════════════════
#  JOB 2 — SCA DEPENDENCY CHECK
# ═══════════════════════════════════════════════
  sca-dependency-check:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: |
          cd app
          curl -sS https://getcomposer.org/installer | php
          php composer.phar install --no-interaction --ignore-platform-reqs || true

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecops-pfe'
          path: './app'
          format: 'HTML JSON'
          args: >
            --enableExperimental

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/

# ═══════════════════════════════════════════════
#  JOB 3 — BUILD DOCKER
# ═══════════════════════════════════════════════
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application with Docker Compose
        run: |
          docker compose up -d --build
          echo "Waiting for services to start..."
          sleep 40
          docker compose ps
          curl -s http://localhost:80 || echo "App still starting..."
          sleep 10
          
# ═══════════════════════════════════════════════
#  JOB 4 — DAST ZAP FULL SCAN
# ═══════════════════════════════════════════════
  # ═══════════════════════════════════════════════
#  JOB 4 — DAST ZAP FULL SCAN
# ═══════════════════════════════════════════════
  dast-zap:
    name: DAST - OWASP ZAP Full Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start VulnShop + wait until ready
        run: |
          docker compose up -d --build
          echo "Waiting for app..."
          sleep 30
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App ready!"
              break
            fi
            sleep 10
          done

      - name: Create ZAP directory + run scan
        run: |
          mkdir -p ${{ github.workspace }}/zap-work
          chmod 777 ${{ github.workspace }}/zap-work

          docker run --network=host \
            -v ${{ github.workspace }}/zap-work:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:80 \
            -r report_html.html \
            -J report_json.json \
            -I || true

          echo "=== ZAP work directory ==="
          ls -la ${{ github.workspace }}/zap-work/

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: ${{ github.workspace }}/zap-work/
          if-no-files-found: warn
# ═══════════════════════════════════════════════
#  JOB 5 — DAST NUCLEI
# ═══════════════════════════════════════════════
  dast-nuclei:
    name: DAST - Nuclei Scanner
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start VulnShop
        run: |
          docker compose up -d --build
          sleep 40
          curl -s http://localhost:80 || echo "Still starting..."
          sleep 10

      - name: Run Nuclei
        run: |
          mkdir -p reports
          docker run --network=host \
            -v $(pwd)/reports:/reports \
            projectdiscovery/nuclei:latest \
            -u http://localhost:80 \
            -severity critical,high,medium \
            -o /reports/nuclei-report.txt \
            -json-export /reports/nuclei-report.json \
            -stats || true

      - name: Upload Nuclei Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuclei-security-report
          path: |
            reports/nuclei-report.txt
            reports/nuclei-report.json


# ═══════════════════════════════════════════════
#  JOB 6 — GENERATE SECURITY DASHBOARD
# ═══════════════════════════════════════════════
  generate-dashboard:
    name: Generate Security Dashboard
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check, dast-zap, dast-nuclei]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Semgrep Report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-security-report
          path: reports/semgrep
        continue-on-error: true

      - name: Download ZAP Report
        uses: actions/download-artifact@v4
        with:
          name: zap-security-report
          path: reports/zap
        continue-on-error: true

      - name: Debug DepCheck files
        run: |
          echo "=== reports/depcheck ==="
          find reports/depcheck -type f 2>/dev/null || echo "empty"
          echo "=== cherche dependency-check partout ==="
          find . -name "dependency-check*" 2>/dev/null

      - name: Download Dependency Check Report
        uses: actions/download-artifact@v4
        with:
          name: dependency-check-report
          path: reports/depcheck
        continue-on-error: true

      - name: Download Nuclei Report
        uses: actions/download-artifact@v4
        with:
          name: nuclei-security-report
          path: reports/nuclei
        continue-on-error: true

      - name: Debug — list all downloaded files
        run: |
          echo "=== reports/semgrep ==="
          find reports/semgrep -type f 2>/dev/null || echo "empty"
          echo "=== reports/zap ==="
          find reports/zap -type f 2>/dev/null || echo "empty"
          echo "=== reports/depcheck ==="
          find reports/depcheck -type f 2>/dev/null || echo "empty"
          echo "=== reports/nuclei ==="
          find reports/nuclei -type f 2>/dev/null || echo "empty"

      - name: Generate Dashboard
        run: |
          python3 << 'EOF'
          import json, os, glob
          from datetime import datetime

          # ─── SEMGREP ───────────────────────────────────────
          def load_semgrep():
              paths = [
                  "reports/semgrep/semgrep-report.json",
                  "reports/semgrep/reports/semgrep-report.json",
              ]
              for p in paths:
                  if os.path.exists(p):
                      print(f"Semgrep found: {p}")
                      with open(p) as f:
                          data = json.load(f)
                      results = data.get("results", [])
                      errors   = [r for r in results if r["extra"]["severity"] == "ERROR"]
                      warnings = [r for r in results if r["extra"]["severity"] == "WARNING"]
                      sqli = [r for r in results if "SQL"     in r["check_id"]]
                      xss  = [r for r in results if "echoed"  in r["check_id"] or "xss" in r["check_id"].lower()]
                      cmdi = [r for r in results if "exec"    in r["check_id"]]
                      return {
                          "total":    len(results),
                          "errors":   len(errors),
                          "warnings": len(warnings),
                          "sqli":     len(sqli),
                          "xss":      len(xss),
                          "cmdi":     len(cmdi),
                          "findings": results[:5]
                      }
              print("Semgrep: file not found!")
              return {"total":0,"errors":0,"warnings":0,"sqli":0,"xss":0,"cmdi":0,"findings":[]}

          # ─── ZAP ───────────────────────────────────────────
          # ─── ZAP ───────────────────────────────────────────
          def load_zap():
              paths = [
                  "reports/zap/report_json.json",
                  "reports/zap/zap-security-report/report_json.json",
              ]
              found = glob.glob("reports/zap/**/*.json", recursive=True)
              for f in found:
                  if f not in paths:
                      paths.append(f)

              for p in paths:
                  if os.path.exists(p):
                      print(f"ZAP found: {p}")
                      with open(p) as f:
                          data = json.load(f)

                      sites = data.get("site", [])
                      if isinstance(sites, dict):
                          sites = [sites]

                      high = medium = low = info = 0
                      all_alerts = []

                      for s in sites:
                          alerts = s.get("alerts", [])
                          for a in alerts:
                              riskcode = int(a.get("riskcode", "0"))
                              all_alerts.append(a)
                              if   riskcode == 3: high   += 1
                              elif riskcode == 2: medium += 1
                              elif riskcode == 1: low    += 1
                              else:               info   += 1

                      print(f"ZAP: {high} High, {medium} Medium, {low} Low, {info} Info")
                      return {
                          "high":   high,
                          "medium": medium,
                          "low":    low,
                          "info":   info,
                          "total":  high + medium + low + info,
                          "alerts": all_alerts[:5]
                      }

              print("ZAP: file not found!")
              return {"high":0,"medium":0,"low":0,"info":0,"total":0,"alerts":[]}

          # ─── DEPENDENCY CHECK ──────────────────────────────
          def load_depcheck():
              paths = [
                  "reports/depcheck/dependency-check-report.json",
                  "reports/depcheck/reports/dependency-check-report.json",
              ]
              found = glob.glob("reports/depcheck/**/*.json", recursive=True)
              for f in found:
                  if f not in paths:
                      paths.append(f)

              print(f"DepCheck paths to try: {paths}")

              for p in paths:
                  if os.path.exists(p):
                      print(f"DepCheck found: {p}")
                      with open(p) as f:
                          data = json.load(f)
                      deps     = data.get("dependencies", [])
                      critical = high = medium = low = 0
                      vuln_list = []
                      for d in deps:
                          vulns = d.get("vulnerabilities", [])
                          for v in vulns:
                              sev = v.get("severity","").upper()
                              if   sev == "CRITICAL": critical += 1
                              elif sev == "HIGH":     high     += 1
                              elif sev == "MEDIUM":   medium   += 1
                              else:                   low      += 1
                              vuln_list.append({
                                  "name":     d.get("fileName","?"),
                                  "cve":      v.get("name","?"),
                                  "severity": sev,
                                  "desc":     v.get("description","")[:120]
                              })
                      print(f"DepCheck: {critical} Critical, {high} High, {medium} Medium, {low} Low")
                      return {
                          "critical": critical, "high": high,
                          "medium":   medium,   "low":  low,
                          "total":    critical + high + medium + low,
                          "vulns":    vuln_list[:5]
                      }

              print("DepCheck: file not found!")
              return {"critical":0,"high":0,"medium":0,"low":0,"total":0,"vulns":[]}

          # ─── NUCLEI ────────────────────────────────────────
          def load_nuclei():
              paths = [
                  "reports/nuclei/nuclei-report.json",
                  "reports/nuclei/reports/nuclei-report.json",
              ]
              found = glob.glob("reports/nuclei/**/*.json", recursive=True)
              for f in found:
                  if f not in paths:
                      paths.append(f)

              for p in paths:
                  if os.path.exists(p):
                      print(f"Nuclei found: {p}")
                      findings = []
                      with open(p) as f:
                          content = f.read().strip()
                      if not content:
                          print("Nuclei: empty file")
                          continue

                      try:
                          data = json.loads(content)
                          if isinstance(data, list):
                              findings = data
                          elif isinstance(data, dict):
                              findings = [data]
                      except:
                          for line in content.splitlines():
                              line = line.strip()
                              if line:
                                  try:
                                      obj = json.loads(line)
                                      if isinstance(obj, list):
                                          findings.extend(obj)
                                      elif isinstance(obj, dict):
                                          findings.append(obj)
                                  except:
                                      pass

                      critical = high = medium = low = info = 0
                      for r in findings:
                          if not isinstance(r, dict):
                              continue
                          sev = r.get("info", {}).get("severity", "").lower()
                          if   sev == "critical": critical += 1
                          elif sev == "high":     high     += 1
                          elif sev == "medium":   medium   += 1
                          elif sev == "low":      low      += 1
                          else:                   info     += 1

                      print(f"Nuclei: {critical} Critical, {high} High, {medium} Medium, {low} Low")
                      return {
                          "critical": critical, "high": high,
                          "medium":   medium,   "low":  low,
                          "info":     info,
                          "total":    len(findings),
                          "findings": findings[:5]
                      }

              print("Nuclei: file not found!")
              return {"critical":0,"high":0,"medium":0,"low":0,"info":0,"total":0,"findings":[]}

          # ─── LOAD ALL ──────────────────────────────────────
          semgrep  = load_semgrep()
          zap      = load_zap()
          depcheck = load_depcheck()
          nuclei   = load_nuclei()

          total = semgrep["total"] + zap["total"] + depcheck["total"] + nuclei["total"]
          now   = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          # ─── HTML DASHBOARD ────────────────────────────────
          html = f"""<!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <title>VulnShop — Security Dashboard</title>
            <style>
              * {{ margin:0; padding:0; box-sizing:border-box; }}
              body {{ font-family:Segoe UI,sans-serif; background:#f5f5f5; padding:20px; color:#1a1a2e; }}
              .header {{ background:linear-gradient(135deg,#1a1a2e,#16213e); color:white; padding:25px 30px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }}
              .header h1 {{ font-size:22px; font-weight:500; }}
              .header p {{ font-size:13px; opacity:0.6; margin-top:4px; }}
              .badge {{ background:#e94560; color:white; font-size:11px; padding:4px 12px; border-radius:20px; }}
              .total-card {{ background:linear-gradient(135deg,#e94560,#c0392b); color:white; border-radius:12px; padding:25px 30px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }}
              .total-card h2 {{ font-size:48px; font-weight:500; }}
              .total-card p {{ font-size:14px; opacity:0.8; margin-top:5px; }}
              .grid4 {{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }}
              .tool-card {{ background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); border-top:4px solid #ccc; }}
              .tool-card.semgrep {{ border-top-color:#7f77dd; }}
              .tool-card.zap     {{ border-top-color:#e94560; }}
              .tool-card.depcheck{{ border-top-color:#f39c12; }}
              .tool-card.nuclei  {{ border-top-color:#27ae60; }}
              .tool-card h3 {{ font-size:13px; color:#888; margin-bottom:12px; font-weight:400; }}
              .tool-card .num {{ font-size:36px; font-weight:500; margin-bottom:4px; }}
              .tool-card .sub {{ font-size:12px; color:#888; }}
              .grid2 {{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }}
              .card {{ background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }}
              .card h3 {{ font-size:14px; font-weight:500; margin-bottom:15px; padding-bottom:10px; border-bottom:2px solid #1a1a2e; }}
              .sev-row {{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f5f5f5; font-size:13px; }}
              .sev-row:last-child {{ border:none; }}
              .dot {{ width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px; }}
              .dot-critical {{ background:#8e0000; }}
              .dot-high    {{ background:#e94560; }}
              .dot-medium  {{ background:#f39c12; }}
              .dot-low     {{ background:#27ae60; }}
              .dot-info    {{ background:#3498db; }}
              table {{ width:100%; border-collapse:collapse; font-size:12px; }}
              th {{ background:#1a1a2e; color:white; padding:8px 12px; text-align:left; font-weight:400; font-size:11px; }}
              td {{ padding:8px 12px; border-bottom:1px solid #f5f5f5; }}
              tr:hover td {{ background:#fafafa; }}
              .sev-badge {{ font-size:10px; padding:2px 8px; border-radius:20px; }}
              .CRITICAL {{ background:#ffe0e0; color:#8e0000; }}
              .HIGH     {{ background:#ffe0e0; color:#c0392b; }}
              .MEDIUM   {{ background:#fff3cd; color:#856404; }}
              .LOW      {{ background:#d4edda; color:#155724; }}
              .WARNING  {{ background:#fff3cd; color:#856404; }}
              .ERROR    {{ background:#ffe0e0; color:#c0392b; }}
              .no-data  {{ text-align:center; color:#aaa; padding:20px; font-size:13px; }}
              footer {{ text-align:center; color:#aaa; font-size:12px; margin-top:20px; padding:20px; background:#1a1a2e; border-radius:12px; }}
              footer span {{ color:#e94560; }}
            </style>
          </head>
          <body>

          <div class="header">
            <div>
              <h1>VulnShop — Security Dashboard</h1>
              <p>Generated on {now} — DevSecOps PFE</p>
            </div>
            <span class="badge">4 tools</span>
          </div>

          <div class="total-card">
            <div>
              <h2>{total}</h2>
              <p>Total findings across all tools</p>
            </div>
            <div style="text-align:right;font-size:13px;opacity:0.85">
              <div>Semgrep  : {semgrep['total']} findings</div>
              <div>ZAP      : {zap['total']} alerts</div>
              <div>DepCheck : {depcheck['total']} CVEs</div>
              <div>Nuclei   : {nuclei['total']} findings</div>
            </div>
          </div>

          <div class="grid4">

            <div class="tool-card semgrep">
              <h3>SAST — Semgrep</h3>
              <div class="num" style="color:#7f77dd">{semgrep['total']}</div>
              <div class="sub">findings</div>
              <div style="margin-top:12px;font-size:12px">
                <div class="sev-row"><span><span class="dot dot-high"></span>High (ERROR)</span><b>{semgrep['errors']}</b></div>
                <div class="sev-row"><span><span class="dot dot-medium"></span>Medium (WARN)</span><b>{semgrep['warnings']}</b></div>
                <div class="sev-row"><span><span class="dot dot-high"></span>SQL Injection</span><b>{semgrep['sqli']}</b></div>
                <div class="sev-row"><span><span class="dot dot-medium"></span>XSS</span><b>{semgrep['xss']}</b></div>
                <div class="sev-row"><span><span class="dot dot-high"></span>Command Inj.</span><b>{semgrep['cmdi']}</b></div>
              </div>
            </div>

            <div class="tool-card zap">
              <h3>DAST — OWASP ZAP</h3>
              <div class="num" style="color:#e94560">{zap['total']}</div>
              <div class="sub">alerts</div>
              <div style="margin-top:12px;font-size:12px">
                <div class="sev-row"><span><span class="dot dot-high"></span>High</span><b>{zap['high']}</b></div>
                <div class="sev-row"><span><span class="dot dot-medium"></span>Medium</span><b>{zap['medium']}</b></div>
                <div class="sev-row"><span><span class="dot dot-low"></span>Low</span><b>{zap['low']}</b></div>
                <div class="sev-row"><span><span class="dot dot-info"></span>Info</span><b>{zap['info']}</b></div>
              </div>
            </div>

            <div class="tool-card depcheck">
              <h3>SCA — Dependency Check</h3>
              <div class="num" style="color:#f39c12">{depcheck['total']}</div>
              <div class="sub">CVEs</div>
              <div style="margin-top:12px;font-size:12px">
                <div class="sev-row"><span><span class="dot dot-critical"></span>Critical</span><b>{depcheck['critical']}</b></div>
                <div class="sev-row"><span><span class="dot dot-high"></span>High</span><b>{depcheck['high']}</b></div>
                <div class="sev-row"><span><span class="dot dot-medium"></span>Medium</span><b>{depcheck['medium']}</b></div>
                <div class="sev-row"><span><span class="dot dot-low"></span>Low</span><b>{depcheck['low']}</b></div>
              </div>
            </div>

            <div class="tool-card nuclei">
              <h3>DAST — Nuclei</h3>
              <div class="num" style="color:#27ae60">{nuclei['total']}</div>
              <div class="sub">findings</div>
              <div style="margin-top:12px;font-size:12px">
                <div class="sev-row"><span><span class="dot dot-critical"></span>Critical</span><b>{nuclei['critical']}</b></div>
                <div class="sev-row"><span><span class="dot dot-high"></span>High</span><b>{nuclei['high']}</b></div>
                <div class="sev-row"><span><span class="dot dot-medium"></span>Medium</span><b>{nuclei['medium']}</b></div>
                <div class="sev-row"><span><span class="dot dot-low"></span>Low</span><b>{nuclei['low']}</b></div>
              </div>
            </div>

          </div>

          <div class="grid2">

            <div class="card">
              <h3>Semgrep — Top findings</h3>
              {"".join([f'''
              <div class="sev-row">
                <span style="font-family:monospace;font-size:11px">{r["path"].replace("app/","")}:{r["start"]["line"]}</span>
                <span class="{r["extra"]["severity"]} sev-badge">{r["extra"]["severity"]}</span>
              </div>''' for r in semgrep["findings"]]) if semgrep["findings"] else '<div class="no-data">No data</div>'}
            </div>

            <div class="card">
              <h3>ZAP — Top alerts</h3>
              {"".join([f'''
              <div class="sev-row">
                <span style="font-size:12px">{a.get("name","?")[:40]}</span>
                <span class="sev-badge" style="background:#ffe0e0;color:#c0392b">{a.get("riskdesc","?").split(" ")[0]}</span>
              </div>''' for a in zap["alerts"]]) if zap["alerts"] else '<div class="no-data">No data</div>'}
            </div>

          </div>

          <div class="grid2">

            <div class="card">
              <h3>Dependency Check — CVEs</h3>
              {"".join([f'''
              <div class="sev-row">
                <span style="font-size:11px;font-family:monospace">{v["cve"]}</span>
                <span class="{v["severity"]} sev-badge">{v["severity"]}</span>
              </div>''' for v in depcheck["vulns"]]) if depcheck["vulns"] else '<div class="no-data">No data</div>'}
            </div>

            <div class="card">
              <h3>Nuclei — Findings</h3>
              {"".join([f'''
              <div class="sev-row">
                <span style="font-size:12px">{r.get("info",{}).get("name","?")[:40]}</span>
                <span class="sev-badge" style="background:#d4edda;color:#155724">{r.get("info",{}).get("severity","?").upper()}</span>
              </div>''' for r in nuclei["findings"]]) if nuclei["findings"] else '<div class="no-data">No data</div>'}
            </div>

          </div>

          <footer>
            <p>Generated by GitHub Actions — <span>VulnShop DevSecOps PFE</span> — {now}</p>
            <p style="margin-top:6px">Tools: Semgrep · OWASP ZAP · Dependency-Check · Nuclei</p>
          </footer>

          </body>
          </html>"""

          os.makedirs("reports", exist_ok=True)
          with open("reports/security-dashboard.html", "w") as f:
              f.write(html)

          print(f"Dashboard generated!")
          print(f"Semgrep  : {semgrep['total']} findings")
          print(f"ZAP      : {zap['total']} findings")
          print(f"DepCheck : {depcheck['total']} CVEs")
          print(f"Nuclei   : {nuclei['total']} findings")
          print(f"TOTAL    : {total} findings")
          EOF

      - name: Upload Security Dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-dashboard
          path: reports/security-dashboard.html