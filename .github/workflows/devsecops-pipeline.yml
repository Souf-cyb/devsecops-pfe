name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST
        run: |
          mkdir -p reports
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/php \
            --json > reports/semgrep-report.json
        continue-on-error: true

      - name: Generate Semgrep HTML Report
        run: |
          python3 << 'EOF'
          import json

          with open("reports/semgrep-report.json") as f:
              data = json.load(f)

          results = data.get("results", [])
          errors = [r for r in results if r["extra"]["severity"] == "ERROR"]
          warnings = [r for r in results if r["extra"]["severity"] == "WARNING"]

          html = f"""<!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>Semgrep SAST Report - VulnShop</title>
              <style>
                  * {{ margin: 0; padding: 0; box-sizing: border-box; }}
                  body {{ font-family: Segoe UI, sans-serif; background: #f5f5f5; padding: 20px; }}
                  .header {{ background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; }}
                  .header h1 {{ font-size: 28px; }}
                  .header p {{ opacity: 0.7; margin-top: 5px; }}
                  .stats {{ display: flex; gap: 20px; margin-bottom: 30px; }}
                  .stat-card {{ background: white; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }}
                  .stat-card h2 {{ font-size: 40px; margin-bottom: 5px; }}
                  .stat-card p {{ color: #666; font-size: 14px; }}
                  .section-title {{ color: #1a1a2e; font-size: 22px; margin-bottom: 20px; padding-left: 15px; border-left: 4px solid #e94560; }}
                  .finding {{ background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border-left: 5px solid #e94560; }}
                  .finding.WARNING {{ border-left-color: #f39c12; }}
                  .finding-header {{ display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }}
                  .finding h3 {{ color: #1a1a2e; font-size: 16px; }}
                  .badge {{ display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }}
                  .badge-error {{ background: #ffe0e0; color: #e94560; }}
                  .badge-warning {{ background: #fff3cd; color: #856404; }}
                  .cwe {{ background: #e8f4fd; color: #2980b9; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 5px; }}
                  .owasp {{ background: #eafaf1; color: #27ae60; padding: 3px 8px; border-radius: 5px; font-size: 12px; margin-right: 5px; }}
                  .meta {{ color: #666; font-size: 13px; margin: 8px 0; }}
                  .meta b {{ color: #1a1a2e; }}
                  .message {{ background: #f8f9fa; padding: 10px 15px; border-radius: 5px; font-size: 13px; color: #444; margin-top: 10px; line-height: 1.5; }}
                  .location {{ background: #1a1a2e; color: #00ff00; padding: 10px 15px; border-radius: 5px; font-family: monospace; font-size: 13px; margin-top: 10px; }}
                  .summary-table {{ width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }}
                  .summary-table th {{ background: #1a1a2e; color: white; padding: 12px 15px; text-align: left; font-size: 13px; }}
                  .summary-table td {{ padding: 10px 15px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }}
                  .summary-table tr:hover {{ background: #f8f9fa; }}
                  footer {{ text-align: center; color: #999; margin-top: 40px; font-size: 13px; padding: 20px; background: #1a1a2e; border-radius: 10px; color: #aaa; }}
                  footer span {{ color: #e94560; }}
              </style>
          </head>
          <body>

          <div class="header">
              <h1>🔍 Semgrep SAST Security Report</h1>
              <p>VulnShop — DevSecOps PFE — Automated Security Analysis</p>
          </div>

          <div class="stats">
              <div class="stat-card">
                  <h2 style="color:#e94560">{len(results)}</h2>
                  <p>Total Findings</p>
              </div>
              <div class="stat-card">
                  <h2 style="color:#e94560">{len(errors)}</h2>
                  <p>🔴 High (Errors)</p>
              </div>
              <div class="stat-card">
                  <h2 style="color:#f39c12">{len(warnings)}</h2>
                  <p>🟠 Medium (Warnings)</p>
              </div>
              <div class="stat-card">
                  <h2 style="color:#3498db">{len(set(r['path'] for r in results))}</h2>
                  <p>📄 Files Affected</p>
              </div>
          </div>

          <h2 class="section-title">📊 Summary Table</h2>
          <table class="summary-table">
              <tr>
                  <th>#</th>
                  <th>File</th>
                  <th>Line</th>
                  <th>Vulnerability</th>
                  <th>Severity</th>
                  <th>CWE</th>
              </tr>
          """

          for i, r in enumerate(results, 1):
              severity = r["extra"]["severity"]
              check_id = r["check_id"].split(".")[-1].replace("-", " ").title()
              path = r["path"]
              line = r["start"]["line"]
              cwes = r["extra"].get("metadata", {}).get("cwe", [])
              cwe_text = cwes[0].split(":")[0] if cwes else "N/A"
              color = "#e94560" if severity == "ERROR" else "#f39c12"
              html += f"""
              <tr>
                  <td>{i}</td>
                  <td><b>{path}</b></td>
                  <td>{line}</td>
                  <td>{check_id}</td>
                  <td style="color:{color}; font-weight:bold">{severity}</td>
                  <td><span class="cwe">{cwe_text}</span></td>
              </tr>
              """

          html += f"""
          </table>

          <h2 class="section-title">📋 Findings Details</h2>
          """

          for r in results:
              severity = r["extra"]["severity"]
              check_id = r["check_id"].split(".")[-1]
              path = r["path"]
              line = r["start"]["line"]
              message = r["extra"]["message"]
              metadata = r["extra"].get("metadata", {})
              cwes = metadata.get("cwe", [])
              owasps = metadata.get("owasp", [])
              impact = metadata.get("impact", "N/A")
              likelihood = metadata.get("likelihood", "N/A")

              cwe_badges = " ".join([f'<span class="cwe">{c.split(":")[0]}</span>' for c in cwes])
              owasp_badges = " ".join([f'<span class="owasp">{o.split(" - ")[0]}</span>' for o in owasps])
              badge_class = "badge-error" if severity == "ERROR" else "badge-warning"

              html += f"""
          <div class="finding {severity}">
              <div class="finding-header">
                  <h3>⚠️ {check_id.replace("-", " ").title()}</h3>
                  <span class="badge {badge_class}">{severity}</span>
                  {cwe_badges}
                  {owasp_badges}
              </div>
              <div class="meta">📄 File: <b>{path}</b> — Line <b>{line}</b></div>
              <div class="meta">💥 Impact: <b>{impact}</b> | 🎯 Likelihood: <b>{likelihood}</b></div>
              <div class="message">💬 {message}</div>
              <div class="location">📍 {path}:{line}</div>
          </div>
          """

          html += """
          <footer>
              <p>Generated by <span>Semgrep OSS</span> — VulnShop DevSecOps PFE</p>
          </footer>
          </body>
          </html>
          """

          with open("reports/semgrep-report.html", "w") as f:
              f.write(html)

          print(f"✅ HTML report generated with {len(results)} findings")
          EOF
        continue-on-error: true

      - name: Upload Semgrep Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-security-report
          path: |
            reports/semgrep-report.json
            reports/semgrep-report.html

  sca-dependency-check:
    name: SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: |
          cd app
          curl -sS https://getcomposer.org/installer | php
          php composer.phar install --no-interaction --ignore-platform-reqs || true
          ls -la

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'devsecops-pfe'
          path: './app'
          format: 'HTML'
          args: >
            --enableExperimental

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sca-dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application with Docker Compose
        run: |
          docker compose up -d --build
          echo "Waiting for services..."
          sleep 40
          docker compose ps
          curl -s http://localhost:80 || echo "App starting..."

  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start VulnShop
        run: |
          docker build -t vulnshop ./app
          docker run -d -p 80:80 --name vulnshop vulnshop
          echo "Waiting for VulnShop to start..."
          sleep 30
          curl -s http://localhost:80 || echo "Still starting..."
          sleep 10

      - name: Create ZAP work directory
        run: |
          mkdir -p zap-work
          chmod 777 zap-work
          chmod 777 .

      - name: Run ZAP Full Scan
        run: |
          docker run --network=host \
            -v $(pwd)/zap-work:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:80 \
            -r report_html.html \
            -J report_json.json \
            -I || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: |
            zap-work/report_html.html
            zap-work/report_json.json
